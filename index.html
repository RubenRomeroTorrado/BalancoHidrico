<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Balanço Hídrico - Lisboa</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            max-width: 600px;
        }
        .inputs {
            margin: 20px 0;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            text-align: center;
        }
        .verde {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .vermelho {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>💧 Balanço Hídrico (IPMA)</h1>
    <p>Estação 1210762 - Lisboa - últimas 24h</p>

    <div class="inputs">
        <label>Capacidade máxima do solo (mm):</label>
        <input type="number" id="smax" value="100" step="5">
        <label>Humidade inicial (mm):</label>
        <input type="number" id="s0" value="50" step="5">
        <button onclick="calcular()">Calcular</button>
    </div>

    <div id="resultadoContainer" class="resultado">
        <!-- A mensagem será inserida aqui pelo JavaScript -->
    </div>

    <script src="script.js"></script>
</body>
</html>
