<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanço Hídrico - Culturas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c4a6e, #0284c7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #0369a1;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #bae6fd;
            padding-bottom: 10px;
        }

        h1 span {
            background: #0284c7;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.5em;
        }

        .estacao {
            background: #e0f2fe;
            padding: 10px 15px;
            border-radius: 15px;
            margin: 15px 0;
            color: #0369a1;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .estacao i {
            font-size: 1.2em;
        }

        .input-group {
            margin: 20px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #0c4a6e;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 15px;
            border: 2px solid #bae6fd;
            border-radius: 15px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #0284c7;
            box-shadow: 0 0 0 4px #bae6fd;
        }

        /* Estilo para os radios de método de rega */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            color: #0369a1;
        }
        .radio-group input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(2, 132, 199, 0.4);
        }

        .info-card {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border-left: 5px solid #0284c7;
            transition: all 0.3s;
        }

        .info-card:hover {
            transform: translateX(5px);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #7dd3fc;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #0369a1;
            font-weight: 500;
        }

        .info-value {
            background: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 700;
            color: #0284c7;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .kc-badge {
            display: inline-block;
            background: #0284c7;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .recomendacao {
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .recomendacao.verde {
            background: linear-gradient(135deg, #a7f3d0, #6ee7b7);
            color: #065f46;
            border: 2px solid #059669;
        }

        .recomendacao.vermelho {
            background: linear-gradient(135deg, #fecaca, #fca5a5);
            color: #991b1b;
            border: 2px solid #dc2626;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #0369a1;
            font-size: 0.9em;
        }

        .footer i {
            font-style: normal;
            background: #bae6fd;
            padding: 2px 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🌱 Rega Inteligente
            <span>Selector de cultura</span>
        </h1>

        <div class="estacao">
            <i>📍</i> Estação 1210762 - Lisboa (últimas 24h)
        </div>

        <div class="input-group">
            <label>🌿 Selecciona a cultura</label>
            <select id="culturaSelect">
                <option value="morangueiro">Morangueiro</option>
                <option value="rucula">Rúcula</option>
                <option value="batata">Batata</option>
            </select>
        </div>

        <div class="input-group">
            <label>📅 Data de plantação</label>
            <input type="date" id="dataPlantacao" value="2025-03-01">
        </div>

        <!-- NOVO: Seletor de método de rega -->
        <div class="input-group">
            <label>💧 Método de rega</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="metodoRega" value="balde" checked> Balde (eficiência 0.5)
                </label>
                <label>
                    <input type="radio" name="metodoRega" value="gota"> Gota-a-gota (eficiência 0.95)
                </label>
            </div>
        </div>

        <div class="input-group">
            <label>💧 Capacidade máxima do solo (mm)</label>
            <input type="number" id="smax" value="100" step="5">
        </div>

        <div class="input-group">
            <label>💧 Humidade inicial do solo (mm)</label>
            <input type="number" id="s0" value="50" step="5">
        </div>

        <button onclick="calcular()">🔍 Calcular Balanço</button>

        <div id="resultadosContainer" style="display: none;">
            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">🌧️ Precipitação (24h)</span>
                    <span class="info-value" id="precip">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">☀️ ETo (24h)</span>
                    <span class="info-value" id="eto">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🌱 Kc (coeficiente cultural)</span>
                    <span class="info-value" id="kc">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">💚 ETc (ETo × Kc)</span>
                    <span class="info-value" id="etc">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">📊 Variação do solo</span>
                    <span class="info-value" id="variacao">-</span>
                </div>
            </div>

            <div id="recomendacao" class="recomendacao"></div>
        </div>

        <div class="footer">
            <i>Dados IPMA · Atualizado a cada execução</i>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
