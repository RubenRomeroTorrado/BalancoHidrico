<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Balanço Hídrico - Lisboa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>💧 Balanço Hídrico (IPMA)</h1>
    <p>Estação 1210762 - Lisboa - últimas 24h</p>

    <div class="inputs">
        <label>Capacidade máxima do solo (mm):</label>
        <input type="number" id="smax" value="100" step="5">
        <label>Humidade inicial (mm):</label>
        <input type="number" id="s0" value="50" step="5">
        <button onclick="calcular()">Calcular</button>
    </div>

    <div class="resultados">
        <h2>Resultados</h2>
        <p>Precipitação total: <span id="precip">-</span> mm</p>
        <p>ETo total: <span id="eto">-</span> mm</p>
        <p>ETa: <span id="eta">-</span> mm</p>
        <p>Escoamento: <span id="runoff">-</span> mm</p>
        <p>Armazenamento final: <span id="armFinal">-</span> mm</p>
        <p>Variação: <span id="variacao">-</span> mm</p>
    </div>

    <div class="graficos">
        <h2>Evolução horária</h2>
        <canvas id="graficoPrecip"></canvas>
        <canvas id="graficoTempHum"></canvas>
        <canvas id="graficoETo"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
